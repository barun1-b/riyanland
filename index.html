<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baryuland 🏘️</title>

  <!-- Retro / pixel fonts: Press Start 2P for headings, VT323 for body (readable) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ====================================================== -->
  <!-- TOP BAR — like a cute desktop / game title bar         -->
  <!-- ====================================================== -->
  <header class="topbar">
    <span class="topbar__title">✦ Baryuland ✦</span>
    <span class="topbar__hint" id="locationLabel">~ choose a place to wander ~</span>
  </header>

  <!-- ====================================================== -->
  <!-- THE TOWN MAP (homepage)                                 -->
  <!-- This is the "desktop". Buildings live here as hotspots. -->
  <!-- ====================================================== -->
  <main id="map" class="map">

    <!-- 
      BACKGROUND IMAGE:
      Replace the placeholder by setting --map-bg in style.css
      OR drop your map art at images/town-map.png
      >>> INSERT YOUR TOWN MAP IMAGE: images/town-map.png <<<
    -->

    <!-- Each .building is a clickable location.
         data-location matches a key in the LOCATIONS object in script.js.
         Position is set with inline style (top/left %) so you can nudge them. -->

    <button class="building" data-location="library" style="top:18%; left:14%;">
      <span class="building__emoji">📚</span>
      <span class="building__name">Library</span>
    </button>

    <button class="building" data-location="park" style="top:20%; left:62%;">
      <span class="building__emoji">🌳</span>
      <span class="building__name">Park</span>
    </button>

    <button class="building" data-location="arcade" style="top:48%; left:30%;">
      <span class="building__emoji">🕹️</span>
      <span class="building__name">Arcade</span>
    </button>

    <button class="building" data-location="cinema" style="top:50%; left:72%;">
      <span class="building__emoji">🎬</span>
      <span class="building__name">Cinema</span>
    </button>

    <button class="building" data-location="apartment" style="top:74%; left:20%;">
      <span class="building__emoji">🏠</span>
      <span class="building__name">Apartment</span>
    </button>

    <button class="building" data-location="beach" style="top:76%; left:64%;">
      <span class="building__emoji">🏖️</span>
      <span class="building__name">Beach</span>
    </button>

    <!-- A little hidden easter egg cat that wanders the map :3 -->
    <button class="secret-cat" id="secretCat" title="...meow?">🐈</button>
  </main>

  <!-- ====================================================== -->
  <!-- SCENE WINDOW — opens when you enter a location          -->
  <!-- Styled like a chunky pastel Windows-95 window.          -->
  <!-- ====================================================== -->
  <section id="scene" class="scene hidden" aria-hidden="true">
    <div class="window">

      <!-- Title bar with close button -->
      <div class="window__bar">
        <span class="window__title" id="sceneTitle">Location</span>
        <div class="window__buttons">
          <button class="winbtn" id="backBtn" title="Back">↩</button>
          <button class="winbtn winbtn--close" id="closeBtn" title="Back to town">✕</button>
        </div>
      </div>

      <!-- The actual scene content gets injected here by script.js -->
      <div class="window__body" id="sceneBody"></div>

    </div>
  </section>

  <!-- ====================================================== -->
  <!-- POPUP — small note / message window (sticky-note style) -->
  <!-- ====================================================== -->
  <div id="popup" class="popup hidden">
    <div class="popup__inner">
      <button class="popup__close" id="popupClose">✕</button>
      <div class="popup__content" id="popupContent"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
